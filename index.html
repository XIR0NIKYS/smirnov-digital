<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artem Smirnov — Growth advisor for consumer mobile apps</title>
  <meta name="description" content="I grow consumer mobile subscription apps. 10 years in the industry. $100M ARR. Eight services across UA, creatives, funnels, monetisation, and more." />
  <meta name="theme-color" content="#121110" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Onest', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #121110;
      color: #ece8da;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: rgba(180,160,90,0.35); }
    html { scrollbar-width: thin; scrollbar-color: rgba(120,110,90,0.4) transparent; }

    /* ── Motion ──────────────────────────────────────────────────────── */
    @keyframes smrRise { from { opacity: 0; transform: translateY(10px); }
                        to   { opacity: 1; transform: translateY(0); } }
    @keyframes smrFade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes smrUnderline { from { transform: scaleX(0); }
                              to   { transform: scaleX(1); } }
    .smr-reveal { opacity: 0; will-change: opacity, transform; }
    .smr-reveal.in { animation: smrRise .55s cubic-bezier(.2,.65,.25,1) both; }
    .smr-page { animation: smrFade .35s ease-out both; }
    .smr-hdr.scrolled {
      box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 6px 18px rgba(0,0,0,.04);
    }
    .smr-row .smr-num { transition: transform .22s cubic-bezier(.2,.7,.3,1), color .2s; }
    .smr-row:hover .smr-num { transform: translateX(2px); }
    .smr-row .smr-title { position: relative; display: inline-block; }
    .smr-row .smr-title::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
      height: 1px; background: currentColor;
      transform-origin: left center; transform: scaleX(0);
      transition: transform .35s cubic-bezier(.2,.7,.3,1);
    }
    .smr-row:hover .smr-title::after { transform: scaleX(1); }
    .smr-row .smr-arrow { transition: transform .22s cubic-bezier(.2,.7,.3,1); }
    .smr-row:hover .smr-arrow { transform: translateX(4px); }
    .smr-icon-stack { position: relative; width: 14px; height: 14px;
                      display: inline-flex; align-items: center; justify-content: center; }
    .smr-icon-stack > svg {
      position: absolute; inset: 0; margin: auto;
      transition: opacity .22s ease, transform .35s cubic-bezier(.3,1.4,.4,1);
    }
    .smr-icon-stack.sun .moon { opacity: 0; transform: rotate(-90deg) scale(.6); }
    .smr-icon-stack.sun .sun  { opacity: 1; transform: rotate(0)      scale(1); }
    .smr-icon-stack.moon .sun  { opacity: 0; transform: rotate(90deg) scale(.6); }
    .smr-icon-stack.moon .moon { opacity: 1; transform: rotate(0)     scale(1); }
    .smr-tg .smr-tg-arrow { transition: transform .25s cubic-bezier(.2,.7,.3,1); }
    .smr-tg:hover .smr-tg-arrow { transform: translate(3px,-3px); }
    .smr-eyebrow-rule { transform-origin: left center;
                        animation: smrUnderline .8s .15s cubic-bezier(.2,.65,.25,1) both; }
    @media (prefers-reduced-motion: reduce) {
      .smr-reveal, .smr-reveal.in, .smr-page, .smr-eyebrow-rule { animation: none !important; }
      .smr-reveal { opacity: 1 !important; transform: none !important; }
    }

    /* ── Mobile layout (≤640px) ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .smr-section-head-prominent .smr-section-h {
        font-size: 24px !important; line-height: 1.1 !important;
      }
      .smr-section-head-prominent .smr-section-note {
        font-size: 15px !important;
      }

      .smr-page-wrap { padding: 0 16px !important; }
      .smr-hdr-inner { padding: 12px 16px !important; gap: 8px !important; }
      .smr-hdr-back  { padding: 4px 9px 4px 7px !important; font-size: 11px !important; }

      .smr-page section { padding-top: 40px !important; padding-bottom: 40px !important; }

      .smr-page > section:first-of-type h1 {
        font-size: 28px !important; line-height: 1.1 !important;
        letter-spacing: -0.018em !important;
        margin-bottom: 22px !important;
      }
      .smr-page > section:first-of-type > p:last-of-type {
        font-size: 15px !important;
      }

      .smr-page [style*="margin-left: 58px"]    { margin-left: 0 !important; }
      .smr-page [style*="margin: 0px 0px 14px 58px"] { margin: 0 0 14px 0 !important; }
      .smr-page [style*="margin: 10px 0px 0px 58px"]{ margin: 10px 0 0 0 !important; }
      .smr-page [style*="margin: 0px 0px 0px 58px"]   { margin: 0 !important; }

      .smr-page [style*="grid-template-columns: 44px 1fr;"] {
        display: block !important;
      }
      .smr-page [style*="grid-template-columns: 44px 1fr;"] > :first-child:not(:empty) {
        display: block !important;
        margin-bottom: 6px !important;
        padding-top: 0 !important;
      }

      .smr-page button[style*="grid-template-columns: 44px 1fr 28px"] {
        grid-template-columns: 24px 1fr 16px !important;
        gap: 10px !important;
      }

      .smr-page [style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }

      .smr-page [style*="max-width: 580"],
      .smr-page [style*="max-width: 560"],
      .smr-page [style*="max-width: 500"],
      .smr-page [style*="max-width: 600"],
      .smr-page [style*="max-width: 480"],
      .smr-page [style*="max-width: 420"] {
        max-width: 100% !important;
      }

      .smr-page [style*="min-height: 92"] {
        min-height: 0 !important;
        padding: 14px 14px !important;
      }

      .smr-page [style*="padding: 24px 24px"],
      .smr-page [style*="padding: 22px 22px"] {
        padding: 18px 16px !important;
      }

      .smr-page nav > button { padding: 16px 16px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="assets/content.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useLayoutEffect } = React;

const C = window.SITE_CONTENT;
const TG_URL = C.telegramUrl;
const SERVICES = C.services;

const FONTS = {
  sans: "'Onest', ui-sans-serif, system-ui, sans-serif",
  mono: "'JetBrains Mono', ui-monospace, monospace",
};
const D = { pad: 28, rowY: 14, sectionGap: 56, baseSize: 14, h1: 28, hero: 36 };
const TOKENS = {
  light: { bg: "#f5f3ea", bgElev: "#ece8db", fg: "#161410", fgSoft: "#3a342a",
           muted: "#857f6e", rule: "#dfd9c4", ruleStrong: "#c9c2a8" },
  dark:  { bg: "#121110", bgElev: "#1a1815", fg: "#ece8da", fgSoft: "#cfcbbb",
           muted: "#8b8676", rule: "#26241e", ruleStrong: "#33302a" },
};

// ── Reveal-on-scroll hook ────────────────────────────────────────────
function useReveal(delayMs = 0) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.animationDelay = `${delayMs}ms`;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, [delayMs]);
  return ref;
}

function Reveal({ children, delay = 0, as = "div", style, ...rest }) {
  const ref = useReveal(delay);
  const Tag = as;
  return <Tag ref={ref} className="smr-reveal" style={style} {...rest}>{children}</Tag>;
}

// ── Icons ────────────────────────────────────────────────────────────
function Sun() {
  return (
    <svg className="sun" viewBox="0 0 24 24" width="14" height="14" fill="none"
         stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
      <circle cx="12" cy="12" r="3.4"/>
      <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/>
    </svg>
  );
}
function Moon() {
  return (
    <svg className="moon" viewBox="0 0 24 24" width="14" height="14" fill="none"
         stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/>
    </svg>
  );
}

// ── Theme toggle (single round button, sun/moon crossfade) ───────────
function ThemeButton({ T, dark, setDark }) {
  return (
    <button
      onClick={() => setDark(!dark)}
      aria-label={dark ? "Switch to light" : "Switch to dark"}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 28, height: 28, padding: 0,
        border: `1px solid ${T.rule}`, borderRadius: 999,
        background: T.bgElev, color: T.fg, cursor: "pointer",
        transition: "background .2s, border-color .2s, transform .2s",
      }}
      onMouseEnter={(e) => { e.currentTarget.style.borderColor = T.ruleStrong; }}
      onMouseLeave={(e) => { e.currentTarget.style.borderColor = T.rule; }}
    >
      <span className={"smr-icon-stack " + (dark ? "moon" : "sun")}>
        <Sun /><Moon />
      </span>
    </button>
  );
}

// ── Header w/ scroll shadow + contextual back-pill ───────────────────
function Header({ T, dark, setDark, setPage, page, L }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const on = () => setScrolled(window.scrollY > 4);
    on();
    window.addEventListener("scroll", on, { passive: true });
    return () => window.removeEventListener("scroll", on);
  }, []);
  const onDetail = page !== "home";
  return (
    <header className={"smr-hdr" + (scrolled ? " scrolled" : "")} style={{
      position: "sticky", top: 0, zIndex: 10,
      background: T.bg + "e6", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)",
      borderBottom: `1px solid ${T.rule}`,
      transition: "box-shadow .25s ease, border-color .25s",
    }}>
      <div className="smr-hdr-inner" style={{ maxWidth: 800, margin: "0 auto", padding: "14px 28px",
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    gap: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, minWidth: 0 }}>
          {!onDetail && (
            <button onClick={() => setPage("home")} style={{
              background: "none", border: 0, padding: 0, cursor: "pointer",
              color: T.fg, font: "inherit", display: "flex", alignItems: "baseline", gap: 8,
              letterSpacing: "-0.012em",
            }}>
              <span style={{ fontWeight: 600, fontSize: 15, whiteSpace: "nowrap" }}>{C.name}</span>
            </button>
          )}
          {onDetail && (
            <button
              onClick={() => setPage("home")}
              className="smr-hdr-back"
              style={{
                display: "inline-flex", alignItems: "center", gap: 6,
                background: T.bgElev, color: T.fg,
                border: `1px solid ${T.rule}`, borderRadius: 999,
                padding: "5px 11px 5px 9px",
                font: "inherit", fontSize: 12,
                fontFamily: FONTS.mono, letterSpacing: "0.02em",
                cursor: "pointer",
                whiteSpace: "nowrap", flexShrink: 0,
                transition: "background .2s, border-color .2s, transform .2s",
              }}
              onMouseEnter={(e) => {
                e.currentTarget.style.borderColor = T.ruleStrong;
                const a = e.currentTarget.querySelector('.smr-hdr-arrow');
                if (a) a.style.transform = 'translateX(-2px)';
              }}
              onMouseLeave={(e) => {
                e.currentTarget.style.borderColor = T.rule;
                const a = e.currentTarget.querySelector('.smr-hdr-arrow');
                if (a) a.style.transform = 'translateX(0)';
              }}
            >
              <span className="smr-hdr-arrow"
                    style={{ display: "inline-block", transition: "transform .2s",
                              color: T.muted }}>←</span>
              {L.allServices}
            </button>
          )}
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <ThemeButton T={T} dark={dark} setDark={setDark} />
        </div>
      </div>
    </header>
  );
}

// ── Telegram link ────────────────────────────────────────────────────
function TgLink({ T, label, big }) {
  return (
    <a className="smr-tg" href={TG_URL} target="_blank" rel="noreferrer"
       style={{
         color: T.fg, textDecoration: "none",
         borderBottom: `1px solid ${T.fg}`, paddingBottom: 2,
         display: "inline-flex", alignItems: "baseline", gap: 6,
         fontSize: big ? 18 : 15, fontWeight: big ? 500 : 400,
       }}>
      {label}
      <span aria-hidden className="smr-tg-arrow"
            style={{ display: "inline-block" }}>↗</span>
    </a>
  );
}

// ── Section head (compact + prominent variants) ──────────────────────
function SectionHead({ T, index, title, note, prominent }) {
  if (prominent) {
    return (
      <div className="smr-section-head-prominent" style={{ marginBottom: 40 }}>
        <p style={{
          fontFamily: FONTS.mono, fontSize: 11, color: T.muted,
          letterSpacing: "0.12em", textTransform: "uppercase",
          margin: "0 0 14px",
          display: "flex", alignItems: "center", gap: 10,
        }}>
          <span className="smr-eyebrow-rule"
                style={{ display: "inline-block", width: 24, height: 1,
                          background: T.muted }} />
          {index}
        </p>
        <h2 className="smr-section-h"
            style={{
              fontSize: 30, fontWeight: 500, margin: 0,
              letterSpacing: "-0.02em", lineHeight: 1.08,
              color: T.fg, textWrap: "balance",
            }}>{title}</h2>
        {note && (
          <p className="smr-section-note"
             style={{
               color: T.fgSoft, fontSize: 17, lineHeight: 1.45,
               margin: "16px 0 0", maxWidth: 540, textWrap: "pretty",
             }}>{note}</p>
        )}
      </div>
    );
  }
  return (
    <div style={{ marginBottom: 26 }}>
      <div style={{
        display: "grid", gridTemplateColumns: "44px 1fr", gap: 14,
        alignItems: "baseline",
      }}>
        <span aria-hidden style={{ display: "block" }} />
        <h2 style={{ fontSize: 19, fontWeight: 500, margin: 0,
                      letterSpacing: "-0.012em", color: T.fg }}>{title}</h2>
      </div>
      {note && (
        <p style={{ color: T.muted, fontSize: 14, margin: "10px 0 0 58px",
                     maxWidth: 500, textWrap: "pretty" }}>{note}</p>
      )}
    </div>
  );
}

// ── Service row ──────────────────────────────────────────────────────
function ServiceRow({ T, num, short, line, onClick }) {
  return (
    <button className="smr-row" onClick={onClick} style={{
      background: "transparent",
      border: 0, padding: `${D.rowY}px 0`, cursor: "pointer",
      font: "inherit", color: T.fg, textAlign: "left", width: "100%",
      display: "grid", gridTemplateColumns: "44px 1fr 28px",
      gap: 14, alignItems: "baseline",
      transition: "background .2s",
    }}>
      <span className="smr-num" style={{
        fontFamily: FONTS.mono, fontSize: 12,
        color: T.muted, paddingTop: 4, letterSpacing: "0.04em",
      }}>{String(num).padStart(2, "0")}</span>
      <div>
        <span className="smr-title" style={{ fontWeight: 500,
                                              fontSize: D.baseSize + 2,
                                              letterSpacing: "-0.012em",
                                              color: T.fg }}>{short}</span>
        <div style={{ color: T.muted, fontSize: 14, textWrap: "pretty",
                       marginTop: 4 }}>{line}</div>
      </div>
      <span className="smr-arrow" style={{ color: T.muted, justifySelf: "end",
                                            paddingTop: 4 }}>→</span>
    </button>
  );
}

// ── Home ─────────────────────────────────────────────────────────────
function Home({ T, lang, L, setPage }) {
  return (
    <main className="smr-page">
      <section style={{ padding: `${D.sectionGap}px 0`, borderBottom: `1px solid ${T.rule}` }}>
        <p style={{ fontFamily: FONTS.mono, fontSize: 11, color: T.muted,
                     letterSpacing: "0.08em", textTransform: "uppercase",
                     margin: "0 0 26px",
                     display: "flex", alignItems: "center", gap: 10 }}>
          <span className="smr-eyebrow-rule"
                style={{ display: "inline-block", width: 24, height: 1, background: T.muted }} />
          {L.heroEyebrow}
        </p>
        <h1 style={{ fontSize: D.hero, fontWeight: 500, lineHeight: 1.08,
                      letterSpacing: "-0.024em", margin: "0 0 28px",
                      textWrap: "balance", maxWidth: 660, color: T.fg,
                      animation: "smrRise .65s cubic-bezier(.2,.65,.25,1) both" }}>
          {L.heroHeadline}
        </h1>
        <p style={{ fontSize: D.baseSize + 2, lineHeight: 1.5, margin: 0,
                     color: T.fgSoft, textWrap: "pretty", maxWidth: 580,
                     animation: "smrRise .65s .12s cubic-bezier(.2,.65,.25,1) both" }}>
          {L.heroBody}
        </p>
      </section>

      <section style={{ padding: `${D.sectionGap}px 0`, borderBottom: `1px solid ${T.rule}` }}>
        <Reveal><SectionHead T={T} index="01 / Services"
                              title={L.servicesTitle} note={L.servicesIntro} prominent /></Reveal>
        <ol style={{ listStyle: "none", padding: 0, margin: "8px 0 0",
                     borderTop: `1px solid ${T.rule}` }}>
          {SERVICES.map((s, i) => {
            const sl = s[lang];
            return (
              <Reveal as="li" key={s.id} delay={i * 60}
                      style={{ borderBottom: `1px solid ${T.rule}` }}>
                <ServiceRow T={T} num={i + 1} short={sl.short} line={sl.line}
                            onClick={() => setPage(s.id)} />
              </Reveal>
            );
          })}
        </ol>
      </section>

      <section style={{ padding: `${D.sectionGap}px 0`, borderBottom: `1px solid ${T.rule}` }}>
        <Reveal><SectionHead T={T} index="02 / About" title={L.aboutTitle} prominent /></Reveal>
        <div style={{ maxWidth: 580 }}>
          {L.aboutBody.map((p, i) => (
            <Reveal as="p" key={i} delay={i * 70}
                    style={{ margin: "0 0 14px", color: T.fgSoft,
                              textWrap: "pretty", fontSize: D.baseSize }}>{p}</Reveal>
          ))}
        </div>

        <div style={{ marginTop: 36 }}>
          <Reveal as="p" style={{ fontFamily: FONTS.mono, fontSize: 11, color: T.muted,
                                   letterSpacing: "0.06em", textTransform: "uppercase",
                                   margin: "0 0 14px" }}>{L.capabilitiesTitle}</Reveal>
          <div style={{
            margin: 0, padding: 0,
            display: "grid",
            gridTemplateColumns: "1fr 1fr",
            gridAutoRows: "1fr",
            border: `1px solid ${T.rule}`,
            borderRadius: 4,
            overflow: "hidden",
            background: T.rule,
            gap: 1,
          }}>
            {L.capabilities.map(([k, v], i) => (
              <Reveal as="div" key={k} delay={i * 50} style={{
                padding: "16px 18px",
                background: T.bg,
                display: "flex",
                flexDirection: "column",
                gap: 6,
                minHeight: 92,
              }}>
                <div style={{ fontWeight: 500, fontSize: 14, color: T.fg,
                               letterSpacing: "-0.005em" }}>{k}</div>
                <div style={{ margin: 0, color: T.muted, fontSize: 14, lineHeight: 1.45,
                               textWrap: "pretty" }}>{v}</div>
              </Reveal>
            ))}
          </div>
        </div>
      </section>

      <section style={{ padding: `${D.sectionGap}px 0` }}>
        <Reveal><SectionHead T={T} index="03 / Contact" title={L.contactTitle} prominent /></Reveal>
        <Reveal delay={80} style={{ maxWidth: 580,
                                     padding: "24px 24px",
                                     border: `1px solid ${T.rule}`, borderRadius: 4,
                                     background: T.bgElev }}>
          <p style={{ margin: "0 0 16px", color: T.fgSoft, fontSize: D.baseSize,
                       textWrap: "pretty" }}>{L.contactBody}</p>
          <TgLink T={T} big label={`Telegram · ${C.telegram}`} />
        </Reveal>
      </section>
    </main>
  );
}

// ── Detail block ─────────────────────────────────────────────────────
function DetailBlock({ T, index, title, items, body, numbered }) {
  return (
    <section style={{ padding: `${D.sectionGap * 0.7}px 0`,
                       borderBottom: `1px solid ${T.rule}` }}>
      <Reveal>
        <div style={{ display: "grid", gridTemplateColumns: "44px 1fr",
                       gap: 14, alignItems: "baseline", marginBottom: 18 }}>
          <span style={{ fontFamily: FONTS.mono, fontSize: 11, color: T.muted,
                          letterSpacing: "0.06em" }}>{index} /</span>
          <h3 style={{ fontSize: 13, fontWeight: 500, margin: 0,
                        letterSpacing: "0.06em", textTransform: "uppercase",
                        color: T.muted }}>{title}</h3>
        </div>
      </Reveal>
      {items && (
        <ul style={{ listStyle: "none", padding: 0, margin: "0 0 0 58px",
                     borderTop: `1px solid ${T.rule}`, maxWidth: 600 }}>
          {items.map((it, i) => (
            <Reveal as="li" key={i} delay={i * 50} style={{
              display: "grid", gridTemplateColumns: "30px 1fr", gap: 10,
              padding: "12px 0", borderBottom: `1px solid ${T.rule}`,
              textWrap: "pretty", fontSize: D.baseSize, color: T.fgSoft,
            }}>
              <span style={{ color: T.muted,
                              fontFamily: numbered ? FONTS.mono : "inherit",
                              fontSize: numbered ? 12 : 16,
                              paddingTop: numbered ? 4 : 0 }}>
                {numbered ? String(i + 1).padStart(2, "0") : "·"}
              </span>
              <span>{it}</span>
            </Reveal>
          ))}
        </ul>
      )}
      {body && (
        <Reveal as="p" style={{ margin: "0 0 0 58px", maxWidth: 560,
                                 color: T.fgSoft, fontSize: D.baseSize,
                                 textWrap: "pretty" }}>{body}</Reveal>
      )}
    </section>
  );
}

// ── Site state w/ localStorage persistence ───────────────────────────
function useSite() {
  const readHash = () => {
    const h = typeof window !== "undefined"
      ? window.location.hash.replace(/^#/, "")
      : "";
    if (!h) return "home";
    return SERVICES.some((s) => s.id === h) ? h : "home";
  };

  const [page, setPageState] = useState(readHash);
  const [lang, setLang] = useState("en");
  const [dark, setDark] = useState(() => {
    try { const v = localStorage.getItem("smr-theme"); return v ? v === "dark" : true; }
    catch (e) { return true; }
  });

  useEffect(() => {
    const initial = page === "home" ? "" : "#" + page;
    if (typeof window !== "undefined" && window.location.hash !== initial) {
      window.history.replaceState({ page }, "", initial || window.location.pathname);
    }
    const onPop = () => setPageState(readHash());
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, []);

  const setPage = React.useCallback((next) => {
    setPageState(next);
    const hash = next === "home" ? "" : "#" + next;
    if (typeof window !== "undefined" && window.location.hash !== hash) {
      window.history.pushState({ page: next }, "", hash || window.location.pathname);
    }
  }, []);

  useEffect(() => {
    try { localStorage.setItem("smr-theme", dark ? "dark" : "light"); } catch (e) {}
  }, [dark]);
  useEffect(() => { window.scrollTo({ top: 0, behavior: "instant" }); }, [page]);
  return { page, setPage, lang, setLang, dark, setDark };
}

// ── Root ─────────────────────────────────────────────────────────────
function Site() {
  const { page, setPage, lang, setLang, dark, setDark } = useSite();
  const T = TOKENS[dark ? "dark" : "light"];
  const L = C[lang];

  useEffect(() => {
    document.documentElement.style.background = T.bg;
    document.body.style.background = T.bg;
    document.body.style.color = T.fg;
    document.body.style.fontFamily = FONTS.sans;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', T.bg);
  }, [T]);

  return (
    <div style={{
      fontFamily: FONTS.sans, color: T.fg, background: T.bg,
      fontSize: D.baseSize, lineHeight: 1.5, minHeight: "100vh",
      transition: "background .35s ease, color .35s ease",
    }}>
      <Header T={T} dark={dark} setDark={setDark} setPage={setPage} page={page} L={L} />
      <div className="smr-page-wrap" style={{ maxWidth: 800, margin: "0 auto", padding: `0 ${D.pad}px` }}>
        <React.Fragment key={page}>
          {page === "home"
            ? <Home   T={T} lang={lang} L={L} setPage={setPage} />
            : <Detail T={T} lang={lang} L={L} setPage={setPage} sid={page} />}
        </React.Fragment>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Site />);
</script>
